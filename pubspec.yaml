name: latres_123230018

description: "Aplikasi mobile TV Show menggunakan Flutter, GetX, dan Hive"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # STATE MANAGEMENT
  get: ^4.6.6

  # API REQUEST
  http: ^1.2.1

  # LOCAL STORAGE
  shared_preferences: ^2.3.2

  # HIVE DATABASE
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # IOS ICON
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # HIVE GENERATOR
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true